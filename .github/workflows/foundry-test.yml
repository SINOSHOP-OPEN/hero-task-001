name: Foundry Tests (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      gas-check:
        description: 'Run gas snapshot check?'
        required: true
        type: boolean
        default: false

env:
  FOUNDRY_PROFILE: ci

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Run tests
        run: forge test -vvv

      - name: Check gas snapshots
        if: ${{ inputs.gas-check }}
        run: forge snapshot --check
